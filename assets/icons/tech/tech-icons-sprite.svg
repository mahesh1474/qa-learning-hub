<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <!-- Selenium: steering-wheel / control hub motif for browser automation -->
  <symbol id="icon-selenium" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="12" cy="12" r="2.4" fill="currentColor"/>
    <path d="M12 3.5V8M12 16v4.5M3.5 12H8M16 12h4.5M6.1 6.1l3 3M14.9 14.9l3 3M6.1 17.9l3-3M14.9 9.1l3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  </symbol>

  <!-- Playwright: abstract wing/feather motif for speed and modern automation -->
  <symbol id="icon-playwright" viewBox="0 0 24 24" fill="none">
    <path d="M4 17c2-7 6.5-12 14-13-1 6-3.5 9.5-7 11.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M6.5 14.5c2.3-1 5.5-2.3 7.7-5.2M5.2 16.3c2.6-1 6.3-2.5 9-5.8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M4 17c1.3 1.6 3.2 2.6 5.2 2.7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  </symbol>

  <!-- API Testing: plug / connector motif representing an API connection -->
  <symbol id="icon-api" viewBox="0 0 24 24" fill="none">
    <path d="M9 7V4M15 7V4M9 20v-3M15 20v-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    <rect x="6.5" y="7" width="11" height="10" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
    <path d="M10 12h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  </symbol>

  <!-- Java: coffee cup with steam, the classic Java association -->
  <symbol id="icon-java" viewBox="0 0 24 24" fill="none">
    <path d="M6 10h10v4.5A4.5 4.5 0 0 1 11.5 19h-1A4.5 4.5 0 0 1 6 14.5V10Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
    <path d="M16 11.2h1.2a2 2 0 0 1 0 4H16" stroke="currentColor" stroke-width="1.6"/>
    <path d="M9 4.5c0 1-1.2 1-1.2 2s1.2 1 1.2 2M13 4.5c0 1-1.2 1-1.2 2s1.2 1 1.2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M5 19.5h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
  </symbol>

  <!-- SQL: classic three-disc database stack icon -->
  <symbol id="icon-sql" viewBox="0 0 24 24" fill="none">
    <ellipse cx="12" cy="5" rx="6.5" ry="2.2" stroke="currentColor" stroke-width="1.6"/>
    <ellipse cx="12" cy="11.3" rx="6.5" ry="2.2" stroke="currentColor" stroke-width="1.6"/>
    <ellipse cx="12" cy="17.6" rx="6.5" ry="2.2" stroke="currentColor" stroke-width="1.6"/>
    <path d="M5.5 5v6.3M18.5 5v6.3M5.5 11.3v6.3M18.5 11.3v6.3" stroke="currentColor" stroke-width="1.6"/>
  </symbol>

  <!-- Git: branching node graph -->
  <symbol id="icon-git" viewBox="0 0 24 24" fill="none">
    <circle cx="6" cy="6" r="2" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="6" cy="18" r="2" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="17" cy="11" r="2" stroke="currentColor" stroke-width="1.6"/>
    <path d="M6 8v8" stroke="currentColor" stroke-width="1.6"/>
    <path d="M6 9.5c0 3.5 3 4 6 4h3" stroke="currentColor" stroke-width="1.6"/>
  </symbol>

  <!-- Jenkins: gear with a play/run arrow at center, representing CI automation -->
  <symbol id="icon-jenkins" viewBox="0 0 24 24" fill="none">
    <path d="M12 3.5v2.3M12 18.2v2.3M5.4 6.9l1.7 1.5M16.9 15.6l1.7 1.5M3.5 12h2.3M18.2 12h2.3M5.4 17.1l1.7-1.5M16.9 8.4l1.7-1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.6"/>
    <path d="M10.3 9.5v5l4-2.5-4-2.5Z" fill="currentColor"/>
  </symbol>

  <!-- TestNG: checklist / clipboard -->
  <symbol id="icon-testng" viewBox="0 0 24 24" fill="none">
    <rect x="5.5" y="4" width="13" height="17" rx="2" stroke="currentColor" stroke-width="1.6"/>
    <path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1" stroke="currentColor" stroke-width="1.6"/>
    <path d="M8.5 10.5 10 12l3-3.5M8.5 16 10 17.5l3-3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <!-- JUnit: target / bullseye for precision unit testing -->
  <symbol id="icon-junit" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="8.5" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="1.6"/>
    <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
  </symbol>

  <!-- Cucumber BDD: simple horizontal capsule silhouette, the clearest cucumber read at small scale -->
  <symbol id="icon-cucumber" viewBox="0 0 24 24" fill="none">
    <rect x="3" y="9.5" width="17" height="5" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
    <path d="M20 11v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M20.5 10.3v3.4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="7" cy="12" r="0.5" fill="currentColor"/>
    <circle cx="10" cy="11.2" r="0.5" fill="currentColor"/>
    <circle cx="13" cy="12.6" r="0.5" fill="currentColor"/>
    <circle cx="16" cy="11.4" r="0.5" fill="currentColor"/>
  </symbol>
</svg>
